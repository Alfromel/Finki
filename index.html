<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>FINKI GC · LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        .app {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
        }

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0A1F0F, #000000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 1;
            pointer-events: none;
        }

        .splash-content {
            text-align: center;
            transform: scale(0.96);
            animation: gentleRise 0.9s ease-out forwards;
        }

        .splash-mascota {
            width: 300px;
            height: 300px;
            background-image: url('m.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin: 0 auto 24px auto;
            filter: drop-shadow(0 0 20px rgba(76, 175, 80, 0.7));
            animation: floatGlow 1.4s infinite alternate ease-in-out;
        }

        .splash-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #FFFFFF, #7CFC00, #2E7D32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            margin-bottom: 12px;
        }

        .splash-sub {
            color: #9eff9e;
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 0.9rem;
            opacity: 0.85;
        }

        @keyframes gentleRise {
            0% { opacity: 0; transform: scale(0.92) translateY(15px);}
            100% { opacity: 1; transform: scale(1) translateY(0);}
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px); filter: drop-shadow(0 0 12px #4CAF50);}
            100% { transform: translateY(-8px); filter: drop-shadow(0 0 28px #7CFC00);}
        }

        .player-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1;
        }

        .video-container {
            width: 100%;
            height: 100%;
            background: black;
            position: relative;
        }

        video, iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: black;
            object-fit: contain;
            pointer-events: auto;
        }

        /* El overlay ya no bloquea el iframe, ahora el iframe es directamente tocable */
        .gesture-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: transparent;
            pointer-events: none;
        }

        .toast-ghost {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px);
            color: #e0ffe0;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            font-family: monospace;
            border-left: 3px solid #6eff6e;
            white-space: nowrap;
        }

        .toast-ghost.show {
            opacity: 1;
        }

        .hidden-ui {
            display: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
<div class="app">
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-mascota"></div>
            <div class="splash-title">FINKI GC - J</div>
            <div class="splash-sub">⚡ ¡¡VAMOS BOLIVIA!! ⚡</div>
        </div>
    </div>

    <div class="player-full" id="playerFull" style="opacity:0; transition: opacity 0.8s ease;">
        <div class="video-container" id="videoContainer"></div>
        <div class="gesture-overlay" id="gestureOverlay"></div>
    </div>

    <div class="toast-ghost" id="toastMsg"></div>
</div>

<script>
    const CHANNELS = [
        {
            id: 1,
            name: "Tigo Sports 1",
            type: "iframe",
            embed: `<iframe src="https://geo.dailymotion.com/player.html?video=xa0fwio" style="width:100%; height:100%; border:none;" allowfullscreen title="Tigo Sports 1" allow="autoplay; fullscreen; picture-in-picture; web-share"></iframe>`,
        },
        {
            id: 2,
            name: "Tigo Sports 2",
            type: "iframe",
            embed: `<iframe src="https://geo.dailymotion.com/player.html?video=x89sfvo" style="width:100%; height:100%; border:none;" allowfullscreen title="Tigo Sports 2" allow="autoplay; fullscreen; picture-in-picture; web-share"></iframe>`,
        },
        {
            id: 3,
            name: "Bolivia TV (Canal 7.1)",
            type: "iframe",
            embed: `<iframe src="https://geo.dailymotion.com/player/x12yfi.html?video=x9nzqpo" style="width:100%; height:100%; border:none;" allowfullscreen title="Bolivia TV" allow="autoplay; fullscreen; picture-in-picture; web-share"></iframe>`,
        },
        {
            id: 4,
            name: "FBF Play",
            type: "hls",
            url: "https://d2qsan2ut81n2k.cloudfront.net/live/20446f64-67d8-4100-8c4b-20a759a8e919/ts:abr.m3u8"
        },
        {
            id: 5,
            name: "Unitel Deportes",
            type: "iframe",
            embed: `<iframe src="https://geo.dailymotion.com/player.html?video=x9nzqpo" style="width:100%; height:100%; border:none;" allowfullscreen title="Unitel" allow="autoplay; fullscreen; picture-in-picture; web-share"></iframe>`,
        }
    ];

    let activeChannel = 3;
    let currentHlsInstance = null;
    let touchStartX = 0;
    let touchEndX = 0;
    let audioUnlocked = false;
    let currentIframe = null;

    const videoContainer = document.getElementById('videoContainer');
    const playerFullDiv = document.getElementById('playerFull');
    const splashElement = document.getElementById('splashScreen');
    const toastEl = document.getElementById('toastMsg');

    function showGhostToast(msg) {
        if (!toastEl) return;
        toastEl.innerText = msg;
        toastEl.classList.add('show');
        setTimeout(() => {
            toastEl.classList.remove('show');
        }, 1300);
    }

    // Función para activar sonido dentro del iframe
    function unlockAudioInIframe() {
        if (audioUnlocked) return true;
        
        const iframe = document.querySelector('iframe');
        if (!iframe) return false;
        
        try {
            // Método 1: Intentar con postMessage para Dailymotion
            iframe.contentWindow.postMessage({
                event: 'volume',
                volume: 1,
                muted: false
            }, '*');
            
            iframe.contentWindow.postMessage({
                command: 'setVolume',
                parameters: [1]
            }, '*');
            
            iframe.contentWindow.postMessage({
                command: 'unmute',
                parameters: []
            }, '*');
            
            // Método 2: Simular clic dentro del iframe para activar políticas de autoplay
            const fakeClick = new MouseEvent('click', {
                view: iframe.contentWindow,
                bubbles: true,
                cancelable: true
            });
            
            // Método 3: Para videos nativos
            const videoElements = document.querySelectorAll('video');
            videoElements.forEach(video => {
                if (video.muted) {
                    video.muted = false;
                }
                if (video.paused) {
                    video.play().catch(e => console.log('Play error:', e));
                }
            });
            
            audioUnlocked = true;
            showGhostToast("🔊 SONIDO ACTIVADO");
            return true;
        } catch(e) {
            console.log('No se pudo enviar mensaje al iframe (cross-origin normal)');
            showGhostToast("🎵 Toca el video para activar sonido");
            return false;
        }
    }

    // Función específica para cuando se toca el iframe directamente
    function handleIframeTap() {
        if (!audioUnlocked) {
            unlockAudioInIframe();
        }
    }

    function destroyHls() {
        if (currentHlsInstance) {
            try {
                currentHlsInstance.destroy();
            } catch(e) { console.warn(e); }
            currentHlsInstance = null;
        }
    }

    function loadChannel(channelId) {
        const channel = CHANNELS.find(c => c.id === channelId);
        if (!channel) return;

        destroyHls();
        videoContainer.innerHTML = '';
        activeChannel = channel.id;
        
        showGhostToast(`${channel.name}`);
        
        if (channel.type === 'iframe') {
            const wrapper = document.createElement('div');
            wrapper.style.width = '100%';
            wrapper.style.height = '100%';
            wrapper.style.position = 'relative';
            wrapper.style.backgroundColor = '#000';
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = channel.embed;
            const iframeElem = tempDiv.querySelector('iframe');
            
            if (iframeElem) {
                // Hacer que el iframe sea completamente interactivo y tocable
                iframeElem.style.position = 'absolute';
                iframeElem.style.top = '0';
                iframeElem.style.left = '0';
                iframeElem.style.width = '100%';
                iframeElem.style.height = '100%';
                iframeElem.style.border = 'none';
                iframeElem.style.pointerEvents = 'auto';
                
                // Agregar evento de toque directamente al iframe
                iframeElem.addEventListener('touchstart', function(e) {
                    e.stopPropagation();
                    handleIframeTap();
                });
                
                iframeElem.addEventListener('click', function(e) {
                    e.stopPropagation();
                    handleIframeTap();
                });
                
                wrapper.appendChild(iframeElem);
                videoContainer.appendChild(wrapper);
                currentIframe = iframeElem;
            } else {
                videoContainer.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;">Stream no disponible</div>`;
            }
        } 
        else if (channel.type === 'hls' && channel.url) {
            const videoElem = document.createElement('video');
            videoElem.controls = false;
            videoElem.autoplay = true;
            videoElem.muted = true;
            videoElem.playsInline = true;
            videoElem.style.width = '100%';
            videoElem.style.height = '100%';
            videoElem.style.objectFit = 'contain';
            videoElem.style.backgroundColor = '#000';
            videoElem.style.pointerEvents = 'auto';
            
            // Agregar evento para video nativo
            videoElem.addEventListener('touchstart', function(e) {
                e.stopPropagation();
                if (videoElem.muted) {
                    videoElem.muted = false;
                    audioUnlocked = true;
                    showGhostToast("🔊 SONIDO ACTIVADO");
                }
                videoElem.play().catch(e => console.log('Play error:', e));
            });
            
            videoElem.addEventListener('click', function(e) {
                e.stopPropagation();
                if (videoElem.muted) {
                    videoElem.muted = false;
                    audioUnlocked = true;
                    showGhostToast("🔊 SONIDO ACTIVADO");
                }
                videoElem.play().catch(e => console.log('Play error:', e));
            });
            
            videoContainer.appendChild(videoElem);
            
            if (Hls && Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30,
                });
                hls.loadSource(channel.url);
                hls.attachMedia(videoElem);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoElem.play().catch(e => console.log("autoplay", e));
                });
                currentHlsInstance = hls;
            } 
            else if (videoElem.canPlayType('application/vnd.apple.mpegurl')) {
                videoElem.src = channel.url;
                videoElem.addEventListener('loadedmetadata', () => videoElem.play());
            } else {
                videoContainer.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;">No compatible HLS</div>`;
            }
        }
        
        audioUnlocked = false;
        localStorage.setItem('finki_last_channel', channel.id);
    }
    
    function nextChannel() {
        let currentIndex = CHANNELS.findIndex(c => c.id === activeChannel);
        let nextIndex = (currentIndex + 1) % CHANNELS.length;
        loadChannel(CHANNELS[nextIndex].id);
    }
    
    function prevChannel() {
        let currentIndex = CHANNELS.findIndex(c => c.id === activeChannel);
        let prevIndex = (currentIndex - 1 + CHANNELS.length) % CHANNELS.length;
        loadChannel(CHANNELS[prevIndex].id);
    }
    
    function goToChannelById(id) {
        const exists = CHANNELS.some(c => c.id === id);
        if (exists) {
            loadChannel(id);
        } else {
            showGhostToast("Canal no disponible");
        }
    }
    
    // Gestos de swipe (con overlay que no bloquea el iframe)
    function initHiddenSwipe() {
        const gestureZone = document.getElementById('gestureOverlay');
        if (!gestureZone) return;
        
        // El overlay ahora tiene pointer-events: none para no bloquear el iframe
        // Pero necesitamos capturar los swipes de otra forma: desde el body
        let touchStartXGlobal = 0;
        let touchStartYGlobal = 0;
        
        document.body.addEventListener('touchstart', (e) => {
            touchStartXGlobal = e.changedTouches[0].screenX;
            touchStartYGlobal = e.changedTouches[0].screenY;
        }, { passive: true });
        
        document.body.addEventListener('touchend', (e) => {
            const touchEndXGlobal = e.changedTouches[0].screenX;
            const touchEndYGlobal = e.changedTouches[0].screenY;
            const diffX = touchEndXGlobal - touchStartXGlobal;
            const diffY = touchEndYGlobal - touchStartYGlobal;
            
            // Swipe horizontal si el movimiento horizontal es mayor que vertical
            if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) {
                    prevChannel();
                    showGhostToast("← ANTERIOR");
                } else {
                    nextChannel();
                    showGhostToast("SIGUIENTE →");
                }
                e.preventDefault();
            }
            touchStartXGlobal = 0;
            touchStartYGlobal = 0;
        });
    }
    
    function initKeyboardNav() {
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key >= '1' && key <= '5') {
                const chNum = parseInt(key, 10);
                goToChannelById(chNum);
                e.preventDefault();
            }
            if (key === 'ArrowRight') {
                nextChannel();
                e.preventDefault();
            }
            if (key === 'ArrowLeft') {
                prevChannel();
                e.preventDefault();
            }
            if (key === ' ' || key === 'Space' || key === 'Enter') {
                unlockAudioInIframe();
                e.preventDefault();
            }
            if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'Escape') {
                e.preventDefault();
            }
        });
    }
    
    function startSplashAndLoad() {
        loadChannel(3);
        
        setTimeout(() => {
            if (splashElement) {
                splashElement.style.opacity = '0';
                setTimeout(() => {
                    if (splashElement && splashElement.parentNode) {
                        splashElement.style.display = 'none';
                        splashElement.remove();
                    }
                    if (playerFullDiv) {
                        playerFullDiv.style.opacity = '1';
                    }
                    
                    // Mostrar mensaje para tocar el iframe
                    setTimeout(() => {
                        showGhostToast("🎵 Toca la pantalla para activar el sonido");
                    }, 500);
                }, 600);
            }
        }, 3000);
    }
    
    function enforceFullscreenSize() {
        const updateSize = () => {
            const player = document.querySelector('.player-full');
            if (player) {
                player.style.width = '100vw';
                player.style.height = '100vh';
            }
            const container = document.getElementById('videoContainer');
            if (container) {
                container.style.width = '100%';
                container.style.height = '100%';
            }
        };
        updateSize();
        window.addEventListener('resize', updateSize);
        window.addEventListener('orientationchange', updateSize);
    }
    
    function removeAnyFloatingUI() {
        const possibleOverlays = document.querySelectorAll('.channel-overlay, .channel-controls, .guide-panel, .header, .key-hint, .badge-live');
        possibleOverlays.forEach(el => {
            if (el) el.remove();
        });
        const styleKiller = document.createElement('style');
        styleKiller.textContent = `
            .channel-controls, .guide-panel, .header, .badge-live, .key-hint, .channel-overlay, .ctrl-btn, .btn-guide, .logo-area, .brand {
                display: none !important;
            }
            body, .app, .player-full, .video-container {
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
            video::-webkit-media-controls {
                display: none !important;
            }
            video::-webkit-media-controls-enclosure {
                display: none !important;
            }
        `;
        document.head.appendChild(styleKiller);
    }
    
    function init() {
        removeAnyFloatingUI();
        enforceFullscreenSize();
        initHiddenSwipe();
        initKeyboardNav();
        startSplashAndLoad();
        
        // También agregar un listener global para el primer toque en cualquier lugar
        document.body.addEventListener('touchstart', function onFirstTouch(e) {
            // No hacer nada aquí, solo para que el navegador sepa que hubo interacción
            // El iframe ya tiene sus propios listeners
            console.log('Interacción detectada');
        }, { passive: true });
    }
    
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
