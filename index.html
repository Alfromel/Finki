<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>FINKI GC · LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* CONTENEDOR PRINCIPAL - SIN HEADER, SIN FOOTER */
        .app {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
        }

        /* PANTALLA DE INICIO CON MASCOTA + LOGO FINKI GC */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0A1F0F, #000000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 1;
            pointer-events: none; /* No bloquea toques pero visible */
        }

        .splash-content {
            text-align: center;
            transform: scale(0.96);
            animation: gentleRise 0.9s ease-out forwards;
        }

        /* mascota m.png */
        .splash-mascota {
            width: 250px;
            height: 250px;
            background-image: url('m.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin: 0 auto 24px auto;
            filter: drop-shadow(0 0 20px rgba(76, 175, 80, 0.7));
            animation: floatGlow 1.4s infinite alternate ease-in-out;
        }

        .splash-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #FFFFFF, #7CFC00, #2E7D32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            margin-bottom: 12px;
        }

        .splash-sub {
            color: #9eff9e;
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 0.9rem;
            opacity: 0.85;
        }

        /* animaciones */
        @keyframes gentleRise {
            0% { opacity: 0; transform: scale(0.92) translateY(15px);}
            100% { opacity: 1; transform: scale(1) translateY(0);}
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px); filter: drop-shadow(0 0 12px #4CAF50);}
            100% { transform: translateY(-8px); filter: drop-shadow(0 0 28px #7CFC00);}
        }

        /* REPRODUCTOR FULLSCREEN (sin bordes ni controles visibles) */
        .player-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1;
        }

        .video-container {
            width: 100%;
            height: 100%;
            background: black;
            position: relative;
        }

        video, iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: black;
            object-fit: contain;
        }

        /* ZONA DE GESTOS INVISIBLE pero funcional (swipe + tap oculto) */
        .gesture-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: transparent;
            pointer-events: auto;
        }

        /* NOTIFICACION TOAST MINIMALISTA (solo funcional, sin interferir diseño) */
        .toast-ghost {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px);
            color: #e0ffe0;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            font-family: monospace;
            border-left: 3px solid #6eff6e;
            white-space: nowrap;
        }

        .toast-ghost.show {
            opacity: 1;
        }

        /* No hay header, ni footer, ni botones visuales. Todo está oculto */
        .hidden-ui {
            display: none;
        }

        /* Aseguramos que no aparezca ningún control flotante */
        .no-controls {
            user-select: none;
        }

        /* para evitar scrolls raros */
        iframe, video {
            pointer-events: auto;
        }
    </style>
    <!-- HLS.js para el stream m3u8 (solo canal 3 es iframe, pero mantenemos por si acaso) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
<div class="app">
    <!-- SPLASH SCREEN: dura 3 segundos, muestra MASCOTA + FINKI GC -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-mascota"></div>
            <div class="splash-title">FINKI GC - J</div>
            <div class="splash-sub">⚡ ¡¡VAMOS BOLIVIA!! ⚡</div>
        </div>
    </div>

    <!-- REPRODUCTOR PRINCIPAL - ÚNICO CANAL (CANAL 3: Bolivia TV) -->
    <div class="player-full" id="playerFull" style="opacity:0; transition: opacity 0.8s ease;">
        <div class="video-container" id="videoContainer">
            <!-- El stream se inyectará dinámicamente -->
        </div>
        <!-- Zona de gestos táctiles / swipe (invisible) -->
        <div class="gesture-overlay" id="gestureOverlay"></div>
    </div>

    <!-- Toast minimal funcional (para feedback de cambios de canal aunque esté oculto visualmente) -->
    <div class="toast-ghost" id="toastMsg"></div>
</div>

<script>
    // =========================================================
    // UNICO CANAL ACTIVO: CANAL 3 (Bolivia TV - Dailymotion)
    // Pero las funciones de cambio de canal están ocultas pero operativas
    // Se define el listado completo de canales (solo por compatibilidad con teclado/gestos)
    // aunque la UI no muestre botones ni headers, se pueden cambiar canales (1 al 5) mediante números o swipe.
    // El diseño NO muestra ningún header, badge, ni panel de guía. Todo permanece oculto.
    // =========================================================
    
    // LISTA DE CANALES (Fútbol Bolivia, tal cual pero sin mostrar controles)
    const CHANNELS = [
        {
            id: 1,
            name: "Tigo Sports 1",
            type: "iframe",
            embed: `<div style="position:relative;width:100%;height:100%;"><iframe src="https://geo.dailymotion.com/player.html?video=xa0fwio" style="width:100%; height:100%; position:absolute; top:0; left:0; border:none;" allowfullscreen title="Tigo Sports 1" allow="web-share"></iframe></div>`,
        },
        {
            id: 2,
            name: "Tigo Sports 2",
            type: "iframe",
            embed: `<div style="position:relative;width:100%;height:100%;"><iframe src="https://geo.dailymotion.com/player.html?video=x89sfvo" style="width:100%; height:100%; position:absolute; top:0; left:0; border:none;" allowfullscreen title="Tigo Sports 2" allow="web-share"></iframe></div>`,
        },
        {
            id: 3,
            name: "Bolivia TV (Canal 7.1)",
            type: "iframe",
            embed: `<div style="position:relative;width:100%;height:100%;"><iframe src="https://geo.dailymotion.com/player/x12yfi.html?video=x9nzqpo" style="width:100%; height:100%; position:absolute; top:0; left:0; border:none;" allowfullscreen title="Bolivia TV" allow="autoplay; fullscreen; picture-in-picture; web-share"></iframe></div>`,
        },
        {
            id: 4,
            name: "FBF Play",
            type: "hls",
            url: "https://d2qsan2ut81n2k.cloudfront.net/live/20446f64-67d8-4100-8c4b-20a759a8e919/ts:abr.m3u8"
        },
        {
            id: 5,
            name: "Unitel Deportes",
            type: "iframe",
            embed: `<div style="position:relative;width:100%;height:100%;"><iframe src="https://geo.dailymotion.com/player.html?video=x9nzqpo" style="width:100%; height:100%; position:absolute; top:0; left:0; border:none;" allowfullscreen title="Unitel"></iframe></div>`,
        }
    ];

    let activeChannel = 3;          // POR DEFECTO: CANAL 3 (Bolivia TV)
    let currentHlsInstance = null;
    let touchStartX = 0;
    let touchEndX = 0;
    let splashActive = true;

    // Elementos DOM
    const videoContainer = document.getElementById('videoContainer');
    const playerFullDiv = document.getElementById('playerFull');
    const splashElement = document.getElementById('splashScreen');
    const toastEl = document.getElementById('toastMsg');

    // ========== FUNCIONES INTERNAS (sin interfaz gráfica de botones) ==========
    function showGhostToast(msg) {
        if (!toastEl) return;
        toastEl.innerText = msg;
        toastEl.classList.add('show');
        setTimeout(() => {
            toastEl.classList.remove('show');
        }, 1300);
    }

    // Destruir HLS si existe
    function destroyHls() {
        if (currentHlsInstance) {
            try {
                currentHlsInstance.destroy();
            } catch(e) { console.warn(e); }
            currentHlsInstance = null;
        }
    }

    // Cargar canal específico (funcionalidad completa pero sin mostrar overlays ni headers)
    function loadChannel(channelId) {
        const channel = CHANNELS.find(c => c.id === channelId);
        if (!channel) return;

        // Limpiar reproductor anterior
        destroyHls();
        videoContainer.innerHTML = '';
        
        // Actualizar canal activo
        activeChannel = channel.id;
        
        // Pequeño feedback táctil (toast invisible visualmente pero funcional)
        showGhostToast(`${channel.name} · ${channel.id}`);
        
        // Reproducción según tipo
        if (channel.type === 'iframe') {
            // Crear contenedor full para iframe
            const wrapper = document.createElement('div');
            wrapper.style.width = '100%';
            wrapper.style.height = '100%';
            wrapper.style.position = 'relative';
            wrapper.style.backgroundColor = '#000';
            // Inyectar embed
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = channel.embed;
            const iframeElem = tempDiv.querySelector('iframe');
            if (iframeElem) {
                iframeElem.style.position = 'absolute';
                iframeElem.style.top = '0';
                iframeElem.style.left = '0';
                iframeElem.style.width = '100%';
                iframeElem.style.height = '100%';
                iframeElem.style.border = 'none';
                wrapper.appendChild(iframeElem);
                videoContainer.appendChild(wrapper);
            } else {
                // fallback
                videoContainer.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;">Stream no disponible</div>`;
            }
        } 
        else if (channel.type === 'hls' && channel.url) {
            // Usar video nativo + HLS
            const videoElem = document.createElement('video');
            videoElem.controls = false;   // SIN CONTROLES VISIBLES
            videoElem.autoplay = true;
            videoElem.muted = false;
            videoElem.playsInline = true;
            videoElem.style.width = '100%';
            videoElem.style.height = '100%';
            videoElem.style.objectFit = 'contain';
            videoElem.style.backgroundColor = '#000';
            videoContainer.appendChild(videoElem);
            
            if (Hls && Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30,
                });
                hls.loadSource(channel.url);
                hls.attachMedia(videoElem);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoElem.play().catch(e => console.log("autoplay", e));
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) console.error("HLS Error");
                });
                currentHlsInstance = hls;
            } 
            else if (videoElem.canPlayType('application/vnd.apple.mpegurl')) {
                videoElem.src = channel.url;
                videoElem.addEventListener('loadedmetadata', () => videoElem.play());
            } else {
                videoContainer.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;">No compatible HLS</div>`;
            }
        }
        
        // guardar en localStorage (opcional)
        localStorage.setItem('finki_last_channel', channel.id);
    }
    
    // Funciones de navegación entre canales (ocultas pero activas)
    function nextChannel() {
        let currentIndex = CHANNELS.findIndex(c => c.id === activeChannel);
        let nextIndex = (currentIndex + 1) % CHANNELS.length;
        loadChannel(CHANNELS[nextIndex].id);
    }
    
    function prevChannel() {
        let currentIndex = CHANNELS.findIndex(c => c.id === activeChannel);
        let prevIndex = (currentIndex - 1 + CHANNELS.length) % CHANNELS.length;
        loadChannel(CHANNELS[prevIndex].id);
    }
    
    function goToChannelById(id) {
        const exists = CHANNELS.some(c => c.id === id);
        if (exists) {
            loadChannel(id);
        } else {
            showGhostToast("Canal no disponible");
        }
    }
    
    // ========== GESTOS DESLIZAR (totalmente ocultos pero operativos) ==========
    function initHiddenSwipe() {
        const gestureZone = document.getElementById('gestureOverlay');
        if (!gestureZone) return;
        
        gestureZone.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });
        
        gestureZone.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 45) {
                if (diff > 0) {
                    prevChannel();
                    showGhostToast("← ANTERIOR");
                } else {
                    nextChannel();
                    showGhostToast("SIGUIENTE →");
                }
            }
            touchStartX = 0;
            touchEndX = 0;
        });
    }
    
    // ========== CONTROL POR TECLADO (números 1-5, flechas, sin interfaz visible) ==========
    function initKeyboardNav() {
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            // Números del 1 al 5 para cambiar canales (funcionalidad completa)
            if (key >= '1' && key <= '5') {
                const chNum = parseInt(key, 10);
                goToChannelById(chNum);
                e.preventDefault();
            }
            // flechas derecha/izquierda para cambiar canal
            if (key === 'ArrowRight') {
                nextChannel();
                e.preventDefault();
            }
            if (key === 'ArrowLeft') {
                prevChannel();
                e.preventDefault();
            }
            // Se evita cualquier otra tecla que muestre interfaz (no hay guía)
            if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'Escape') {
                // No hacemos nada: sin menú, sin guía.
                e.preventDefault();
            }
        });
    }
    
    // ========== ANIMACIÓN SPLASH 3 SEGUNDOS Y LUEGO MUESTRA CANAL 3 ==========
    function startSplashAndLoad() {
        // Forzamos que el canal 3 (Bolivia TV) esté listo mientras el splash se muestra
        // Pero precargamos en segundo plano? Mejor cargar después de fadeout.
        // Aseguramos que el contenedor de video esté listo pero invisible.
        // Inicialmente playerFull tiene opacity 0.
        // Al terminar los 3 segundos, hacemos fadein del reproductor y eliminamos splash.
        
        // Cargar el canal 3 (por defecto) pero mientras está oculto, no importa
        // Cargamos el stream directamente pero con el reproductor opaco, para que al mostrar esté listo.
        loadChannel(3);   // Canal 3 = Bolivia TV (el que se debe mostrar de inicio)
        
        // Después de 3000ms (3 segundos) eliminar splash y mostrar el player con animación
        setTimeout(() => {
            if (splashElement) {
                splashElement.style.opacity = '0';
                // Después de la transición de opacidad, eliminar del DOM
                setTimeout(() => {
                    if (splashElement && splashElement.parentNode) {
                        splashElement.style.display = 'none';
                        splashElement.remove();  // Eliminar completamente
                    }
                    // Mostrar el reproductor con fade-in
                    if (playerFullDiv) {
                        playerFullDiv.style.opacity = '1';
                    }
                    // Ajuste para garantizar que el stream se vea correctamente
                    const currentChannel = CHANNELS.find(c => c.id === activeChannel);
                    if (currentChannel && currentChannel.type === 'iframe') {
                        // Pequeño reforce para iframe responsive
                        const iframes = document.querySelectorAll('iframe');
                        iframes.forEach(iframe => {
                            try {
                                iframe.style.width = '100%';
                                iframe.style.height = '100%';
                            } catch(e) {}
                        });
                    }
                }, 600);
            }
        }, 3000); // 3 segundos exactos de animación
    }
    
    // ========== ASEGURAR QUE EL PLAYER OCUPE TODA LA PANTALLA SIN BORDES ==========
    function enforceFullscreenSize() {
        const updateSize = () => {
            const player = document.querySelector('.player-full');
            if (player) {
                player.style.width = '100vw';
                player.style.height = '100vh';
            }
            const container = document.getElementById('videoContainer');
            if (container) {
                container.style.width = '100%';
                container.style.height = '100%';
            }
        };
        updateSize();
        window.addEventListener('resize', updateSize);
        window.addEventListener('orientationchange', updateSize);
    }
    
    // ========== MANTENER EN PRIMER PLANO Y EVITAR CONTROLES VISIBLES ==========
    function removeAnyFloatingUI() {
        // Aseguramos que no queden restos de otros elementos (como badges que pudieran existir)
        // Eliminar cualquier elemento con clases sospechosas (por si acaso)
        const possibleOverlays = document.querySelectorAll('.channel-overlay, .channel-controls, .guide-panel, .header, .key-hint, .badge-live');
        possibleOverlays.forEach(el => {
            if (el) el.remove();
        });
        // También aseguramos que no haya ningún botón flotante (por si algún residuo)
        const styleKiller = document.createElement('style');
        styleKiller.textContent = `
            .channel-controls, .guide-panel, .header, .badge-live, .key-hint, .channel-overlay, .ctrl-btn, .btn-guide, .logo-area, .brand {
                display: none !important;
            }
            body, .app, .player-full, .video-container {
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
        `;
        document.head.appendChild(styleKiller);
    }
    
    // ========== INICIALIZACIÓN DEFINITIVA ==========
    function init() {
        // Ocultar cualquier vestigio de UI no deseado
        removeAnyFloatingUI();
        enforceFullscreenSize();
        
        // Inicializar gestos y teclado (funcional pero invisible)
        initHiddenSwipe();
        initKeyboardNav();
        
        // Iniciar splash de 3 segundos y después mostrar el canal 3 (Bolivia TV)
        startSplashAndLoad();
        
        // Pequeño helper para mantener el foco en el stream y evitar pantalla apagada (opcional)
        setInterval(() => {
            // Solo mantener activo, sin ninguna interacción visual
        }, 25000);
    }
    
    // Arrancar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
