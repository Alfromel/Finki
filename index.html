<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A2F1F">
    <title>BOLIVIA FÚTBOL TV · Stream Deportivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --verde-profundo: #0A2F1F;
            --verde-oscuro: #1A4D2A;
            --verde-brillante: #2E7D32;
            --verde-neon: #4CAF50;
            --negro-carbono: #030603;
            --gris-oscuro: #1E1E1E;
            --blanco-puro: #FFFFFF;
            --blanco-humo: #F5F5F5;
            --gris-claro: #AAAAAA;
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        body {
            background-color: var(--negro-carbono);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Inter', sans-serif;
            color: var(--blanco-puro);
            overflow-x: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* INTERFAZ GLOBAL */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--negro-carbono);
            display: flex;
            flex-direction: column;
        }

        /* HEADER ELEGANTE */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: linear-gradient(180deg, rgba(3,6,3,0.95) 0%, rgba(3,6,3,0) 100%);
            padding: 20px 24px 40px 24px;
            pointer-events: none;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .mascota {
            width: 48px;
            height: 48px;
            background-image: url('m.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 8px #4CAF50);
        }
        
        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF, #4CAF50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .badge-live {
            background: #E53935;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(229,57,53,0.6);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(0.98);}
            100% { opacity: 1; transform: scale(1);}
        }
        
        /* PLAYER PRINCIPAL */
        .player-wrapper {
            flex: 1;
            width: 100%;
            background: #000000;
            position: relative;
            overflow: hidden;
        }
        
        .video-container {
            width: 100%;
            height: 100%;
            background: black;
        }
        
        iframe, .hls-player {
            width: 100%;
            height: 100%;
            border: none;
            background: black;
        }
        
        .channel-overlay {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 40px;
            border-left: 5px solid var(--verde-neon);
            font-weight: bold;
            z-index: 30;
            pointer-events: none;
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: var(--shadow-xl);
        }
        
        .channel-number {
            color: var(--verde-neon);
            margin-right: 8px;
        }
        
        /* CONTROL DE CANALES (NUMERICO / DESLIZANTE) */
        .channel-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 10px 16px;
            border-radius: 50px;
            display: flex;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            border: 1px solid rgba(76,175,80,0.5);
            pointer-events: auto;
        }
        
        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            width: 44px;
            height: 44px;
            border-radius: 40px;
        }
        
        .ctrl-btn:active {
            background: var(--verde-oscuro);
            transform: scale(0.92);
        }
        
        /* Guía de canales */
        .guide-panel {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: var(--negro-carbono);
            backdrop-filter: blur(20px);
            background-color: rgba(3,6,3,0.9);
            border-radius: 24px;
            padding: 12px 0;
            min-width: 220px;
            border: 1px solid var(--verde-oscuro);
            z-index: 150;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            pointer-events: auto;
        }
        
        .guide-panel.open {
            transform: translateX(0);
        }
        
        .guide-item {
            padding: 12px 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            border-bottom: 1px solid rgba(76,175,80,0.2);
            cursor: pointer;
            transition: 0.1s;
        }
        
        .guide-item:active {
            background: var(--verde-oscuro);
        }
        
        .guide-num {
            font-weight: bold;
            color: var(--verde-neon);
            width: 35px;
        }
        
        .guide-name {
            font-weight: 500;
        }
        
        /* Gestos deslizar (mobile) */
        .swipe-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: auto;
        }
        
        /* Diseño responsivo TV y PC */
        @media (min-width: 1024px) {
            .channel-controls {
                bottom: 40px;
                right: 40px;
            }
            .guide-panel {
                bottom: 110px;
                right: 40px;
            }
            .brand {
                font-size: 2rem;
            }
            .mascota {
                width: 64px;
                height: 64px;
            }
        }
        
        /* notificacion sutil */
        .toast-msg {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--verde-profundo);
            color: white;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 300;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-left: 4px solid #4CAF50;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        
        .toast-msg.show {
            opacity: 1;
        }
        
        /* hint numerico */
        .key-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #aaa;
            z-index: 200;
            backdrop-filter: blur(4px);
        }
        
        @media (max-width: 768px) {
            .key-hint {
                display: none;
            }
        }
    </style>
    <!-- HLS.js para el stream .m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="header-content">
            <div class="logo-area">
                <div class="mascota"></div>
                <span class="brand">BOLIVIA FÚTBOL TV</span>
            </div>
            <div class="badge-live">EN VIVO</div>
        </div>
    </div>

    <div class="player-wrapper" id="playerWrapper">
        <div class="video-container" id="videoContainer">
            <!-- Aquí se cargará dinámicamente iframe o video nativo HLS -->
        </div>
        <div class="swipe-area" id="swipeArea"></div>
        <div class="channel-overlay" id="channelOverlay">
            <span class="channel-number" id="currentChannelNum">1</span>
            <span id="currentChannelName">Tigo Sports 1</span>
        </div>
    </div>

    <div class="channel-controls">
        <button class="ctrl-btn" id="btnPrev"><i class="icon-prev">◀</i></button>
        <button class="ctrl-btn" id="btnNext"><i class="icon-next">▶</i></button>
        <button class="ctrl-btn" id="btnGuide"><i class="icon-list">☰</i></button>
    </div>
    
    <div class="guide-panel" id="guidePanel">
        <!-- canales dinámicos -->
    </div>
    <div class="key-hint">💡 Usa los números (1-5) en tu control remoto</div>
    <div class="toast-msg" id="toastMsg"></div>
</div>

<script>
    // =========================================================
    // LISTA DEFINITIVA DE CANALES: SOLO FÚTBOL BOLIVIA + STREAMING
    // =========================================================
    const CHANNELS = [
        {
            id: 1,
            name: "Tigo Sports 1",
            type: "iframe",
            embed: `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;"><iframe src="https://geo.dailymotion.com/player.html?video=xa0fwio" style="width:100%; height:100%; position:absolute; left:0px; top:0px; overflow:hidden; border:none;" allowfullscreen title="Dailymotion Video Player" allow="web-share"></iframe></div>`,
            url: null
        },
        {
            id: 2,
            name: "Tigo Sports 2",
            type: "iframe",
            embed: `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;"><iframe src="https://geo.dailymotion.com/player.html?video=x89sfvo" style="width:100%; height:100%; position:absolute; left:0px; top:0px; overflow:hidden; border:none;" allowfullscreen title="Dailymotion Video Player" allow="web-share"></iframe></div>`,
            url: null
        },
        {
            id: 3,
            name: "Canal 7.1 (Bolivia TV)",
            type: "iframe",
            embed: `<iframe frameborder="0" width="100%" height="100%" src="https://geo.dailymotion.com/player/x12yfi.html?video=x9nzqpo" allowfullscreen allow="autoplay; fullscreen; picture-in-picture; web-share" title="Canal 7.1"></iframe>`,
            url: null
        },
        {
            id: 4,
            name: "FBF Play (M3U8 HD)",
            type: "hls",
            embed: null,
            url: "https://d2qsan2ut81n2k.cloudfront.net/live/20446f64-67d8-4100-8c4b-20a759a8e919/ts:abr.m3u8"
        },
        {
            id: 5,
            name: "Unitel (Partidos Especiales)",
            type: "iframe",
            embed: `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;"><iframe src="https://geo.dailymotion.com/player.html?video=x9nzqpo" style="width:100%; height:100%; position:absolute; left:0px; top:0px; overflow:hidden; border:none;" allowfullscreen title="Unitel Deportes"></iframe></div>`,
            url: null
        }
    ];

    let activeChannel = 1;          // ID activo
    let currentHlsInstance = null;   // para limpiar hls
    let touchStartX = 0;
    let touchEndX = 0;

    // Elementos DOM
    const videoContainer = document.getElementById('videoContainer');
    const channelOverlayNum = document.getElementById('currentChannelNum');
    const channelOverlayName = document.getElementById('currentChannelName');
    const guidePanel = document.getElementById('guidePanel');
    const toastMsg = document.getElementById('toastMsg');

    // ==================== FUNCIÓN PRINCIPAL: CARGAR CANAL ==================
    function loadChannel(channelId) {
        const channel = CHANNELS.find(c => c.id === channelId);
        if (!channel) return;
        
        // Limpiar cualquier reproductor HLS anterior
        if (currentHlsInstance) {
            currentHlsInstance.destroy();
            currentHlsInstance = null;
        }
        
        // Limpiar contenedor
        videoContainer.innerHTML = '';
        
        // Actualizar UI
        activeChannel = channel.id;
        channelOverlayNum.innerText = channel.id;
        channelOverlayName.innerText = channel.name;
        
        // Mostrar notificacion visual breve
        showToast(`${channel.name} · Canal ${channel.id}`);
        
        // Lógica de reproducción según tipo
        if (channel.type === 'iframe') {
            // Crear wrapper 100% altura sin márgenes extra
            const wrapperDiv = document.createElement('div');
            wrapperDiv.style.width = '100%';
            wrapperDiv.style.height = '100%';
            wrapperDiv.style.position = 'relative';
            wrapperDiv.style.backgroundColor = '#000';
            // Inyectar el embed (iframe) pero ajustarlo para ocupar todo el contenedor
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = channel.embed;
            const iframeElement = tempDiv.querySelector('iframe');
            if (iframeElement) {
                // Eliminar estilos antiguos de padding-bottom y hacerlo full
                iframeElement.style.position = 'absolute';
                iframeElement.style.top = '0';
                iframeElement.style.left = '0';
                iframeElement.style.width = '100%';
                iframeElement.style.height = '100%';
                iframeElement.style.border = 'none';
                // Contenedor absoluto responsivo
                const fullFrameContainer = document.createElement('div');
                fullFrameContainer.style.position = 'relative';
                fullFrameContainer.style.width = '100%';
                fullFrameContainer.style.height = '100%';
                fullFrameContainer.appendChild(iframeElement);
                videoContainer.appendChild(fullFrameContainer);
            } else {
                // Fallback: insertar raw embed con arreglo de altura
                const fallbackDiv = document.createElement('div');
                fallbackDiv.innerHTML = channel.embed;
                const firstChild = fallbackDiv.firstElementChild;
                if (firstChild) {
                    firstChild.style.position = 'absolute';
                    firstChild.style.top = '0';
                    firstChild.style.left = '0';
                    firstChild.style.width = '100%';
                    firstChild.style.height = '100%';
                    videoContainer.appendChild(firstChild);
                } else {
                    videoContainer.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;">Error al cargar el stream</div>`;
                }
            }
        } 
        else if (channel.type === 'hls' && channel.url) {
            // Usar HLS.js para m3u8
            const videoElem = document.createElement('video');
            videoElem.controls = true;
            videoElem.autoplay = true;
            videoElem.muted = false;
            videoElem.playsInline = true;
            videoElem.style.width = '100%';
            videoElem.style.height = '100%';
            videoElem.style.objectFit = 'contain';
            videoElem.style.backgroundColor = '#000';
            videoContainer.appendChild(videoElem);
            
            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30,
                });
                hls.loadSource(channel.url);
                hls.attachMedia(videoElem);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoElem.play().catch(e => console.log("Auto-play bloqueado", e));
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.error("HLS Error fatal", data);
                    }
                });
                currentHlsInstance = hls;
            } 
            else if (videoElem.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari nativo
                videoElem.src = channel.url;
                videoElem.addEventListener('loadedmetadata', () => videoElem.play());
            } else {
                videoContainer.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;">Tu navegador no soporta este stream</div>`;
            }
        }
        
        // Guardar en localStorage la ultima sesion
        localStorage.setItem('bolivia_last_channel', channel.id);
    }
    
    // Siguiente canal
    function nextChannel() {
        let currentIndex = CHANNELS.findIndex(c => c.id === activeChannel);
        let nextIndex = (currentIndex + 1) % CHANNELS.length;
        loadChannel(CHANNELS[nextIndex].id);
    }
    
    function prevChannel() {
        let currentIndex = CHANNELS.findIndex(c => c.id === activeChannel);
        let prevIndex = (currentIndex - 1 + CHANNELS.length) % CHANNELS.length;
        loadChannel(CHANNELS[prevIndex].id);
    }
    
    function goToChannelById(id) {
        const exists = CHANNELS.some(c => c.id === id);
        if (exists) {
            loadChannel(id);
        } else {
            showToast("Canal no disponible");
        }
    }
    
    // Mostrar guía de canales
    function toggleGuide() {
        guidePanel.classList.toggle('open');
        renderGuideList();
    }
    
    function renderGuideList() {
        guidePanel.innerHTML = '';
        CHANNELS.forEach(ch => {
            const item = document.createElement('div');
            item.className = 'guide-item';
            item.innerHTML = `<span class="guide-num">${ch.id}</span><span class="guide-name">${ch.name}</span>`;
            item.onclick = (e) => {
                e.stopPropagation();
                loadChannel(ch.id);
                guidePanel.classList.remove('open');
            };
            guidePanel.appendChild(item);
        });
    }
    
    // Toast efímero
    function showToast(msg) {
        toastMsg.innerText = msg;
        toastMsg.classList.add('show');
        setTimeout(() => {
            toastMsg.classList.remove('show');
        }, 1800);
    }
    
    // =============== GESTOS TÁCTILES (deslizar en móvil) ===============
    function initSwipeDetection() {
        const swipeZone = document.getElementById('swipeArea');
        if (!swipeZone) return;
        swipeZone.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });
        
        swipeZone.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    // deslizar derecha -> canal anterior
                    prevChannel();
                    showToast("← Canal anterior");
                } else {
                    // deslizar izquierda -> siguiente canal
                    nextChannel();
                    showToast("Canal siguiente →");
                }
            }
            touchStartX = 0;
            touchEndX = 0;
        });
    }
    
    // =============== CONTROL POR TECLADO (NÚMEROS para TV/remoto) ===============
    function initKeyboardControl() {
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            // detectar números del 1 al 5 (canales)
            if (key >= '1' && key <= '5') {
                const channelNum = parseInt(key, 10);
                goToChannelById(channelNum);
                e.preventDefault();
                showToast(`Canal ${channelNum}`);
            }
            // flechas derecha/izquierda también para mayor comodidad
            if (key === 'ArrowRight') {
                nextChannel();
                e.preventDefault();
                showToast("Siguiente");
            }
            if (key === 'ArrowLeft') {
                prevChannel();
                e.preventDefault();
                showToast("Anterior");
            }
            if (key === 'ArrowUp' || key === 'ArrowDown') {
                toggleGuide();
                e.preventDefault();
            }
            if (key === 'Escape') {
                guidePanel.classList.remove('open');
            }
        });
    }
    
    // =============== BOTONES UI ===============
    function initButtons() {
        document.getElementById('btnPrev').addEventListener('click', () => {
            prevChannel();
            showToast("Canal anterior");
        });
        document.getElementById('btnNext').addEventListener('click', () => {
            nextChannel();
            showToast("Canal siguiente");
        });
        document.getElementById('btnGuide').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleGuide();
        });
        // Cerrar guía si se hace click fuera (opcional)
        document.addEventListener('click', function(event) {
            if (!guidePanel.contains(event.target) && event.target !== document.getElementById('btnGuide')) {
                guidePanel.classList.remove('open');
            }
        });
    }
    
    // =============== DETECTAR DISPOSITIVO Y RESET ===============
    function ensureFullscreenVideo() {
        // ajustar altura dinámica del contenedor para que ocupe toda pantalla
        const wrapper = document.querySelector('.player-wrapper');
        const updateHeight = () => {
            const windowHeight = window.innerHeight;
            wrapper.style.height = `${windowHeight}px`;
        };
        updateHeight();
        window.addEventListener('resize', updateHeight);
    }
    
    // Cargar último canal o empezar por defecto
    function loadLastSession() {
        const last = localStorage.getItem('bolivia_last_channel');
        if (last && CHANNELS.some(c => c.id == last)) {
            loadChannel(parseInt(last, 10));
        } else {
            loadChannel(1); // Tigo Sports 1 por defecto
        }
    }
    
    // =============== MANTENER ACTIVO, EVITAR BLOQUEO AUTOPLAY ===============
    function init() {
        ensureFullscreenVideo();
        loadLastSession();
        initSwipeDetection();
        initKeyboardControl();
        initButtons();
        renderGuideList();
        // para que el player no tenga problemas de autoplay en navegadores, ya está
        // Precarga visual
        setInterval(() => {
            // Pequeño "keep alive" de consciencia, no interfiere
        }, 30000);
    }
    
    // Ejecutar todo cuando DOM listo
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
