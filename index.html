<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#141414">
  <title>Finki Stream - Premium</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #E50914;
      --bg: #141414;
      --text: #ffffff;
      --text-secondary: #b3b3b3;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    
    html, body {
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-overflow-scrolling: touch;
    }
    
    /* === AUTH SCREEN === */
    .auth-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    
    .auth-container {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .auth-logo {
      text-align: center;
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(45deg, #E50914, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
      letter-spacing: -2px;
    }
    
    .auth-tabs {
      display: flex;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 4px;
    }
    
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: #999;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.95rem;
    }
    
    .auth-tab.active {
      background: #E50914;
      color: white;
      box-shadow: 0 4px 15px rgba(229,9,20,0.4);
    }
    
    .input-group {
      position: relative;
      margin-bottom: 15px;
    }
    
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
    }
    
    .input-group input {
      width: 100%;
      padding: 16px 16px 16px 45px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      transition: 0.3s;
      outline: none;
    }
    
    .input-group input:focus {
      border-color: #E50914;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 0 4px rgba(229,9,20,0.1);
    }
    
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: #E50914;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
      letter-spacing: 0.5px;
    }
    
    .btn-submit:active {
      transform: scale(0.98);
      background: #c70812;
    }
    
    .error-msg {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
      padding: 8px;
      background: rgba(255,107,107,0.1);
      border-radius: 8px;
    }
    
    /* === MAIN APP === */
    .app {
      display: none;
      height: 100vh;
      height: -webkit-fill-available;
      background: #000;
      flex-direction: column;
    }
    
    .app.active {
      display: flex;
    }
    
    /* === HEADER === */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding-top: calc(15px + var(--safe-top));
    }
    
    .header-logo {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(45deg, #E50914, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    
    .header-right {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    
    .header-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 8px;
    }
    
    .profile-avatar {
      width: 35px;
      height: 35px;
      border-radius: 8px;
      background: linear-gradient(135deg, #E50914, #ff4444);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2);
    }
    
    /* === HERO CAROUSEL (SOLO INICIO) === */
    .hero-section {
      position: relative;
      height: 70vh;
      min-height: 400px;
      overflow: hidden;
      transition: background 1s ease;
    }
    
    .hero-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      background-size: cover;
      background-position: center;
    }
    
    .hero-slide.active {
      opacity: 1;
    }
    
.hero-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.6) 100%);
  z-index: 1;
}
    
    .hero-content {
      position: absolute;
      bottom: 25%;
      left: 5%;
      right: 5%;
      z-index: 2;
    }
    
.hero-title {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  margin-bottom: 10px;
  text-shadow: 3px 3px 8px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.8);
  line-height: 1.1;
  color: #ffffff;
}

.hero-meta {
  font-size: clamp(0.9rem, 2vw, 1.2rem);
  color: #ffffff;
  margin-bottom: 20px;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
}
    
    .hero-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .btn-hero {
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
      white-space: nowrap;
    }
    
    .btn-hero:active {
      transform: scale(0.95);
    }
    
    .btn-play {
      background: white;
      color: black;
    }
    
    .btn-list {
      background: rgba(109,109,109,0.4);
      color: white;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .hero-progress {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 3;
    }
    
    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: 0.3s;
    }
    
    .progress-dot.active {
      background: #E50914;
      width: 24px;
      border-radius: 4px;
    }
    
    /* === CONTENT AREA === */
    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding-bottom: calc(80px + var(--safe-bottom));
      scrollbar-width: none;
    }
    
    .content-area::-webkit-scrollbar {
      display: none;
    }
    
    /* === HOME ROWS (CON SLIDER) === */
    .content-row {
      margin-bottom: 30px;
      padding: 0 5%;
    }
    
    .row-header {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 700;
      margin-bottom: 12px;
      color: #e5e5e5;
    }
    
    .row-slider {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 10px;
    }
    
    .row-slider::-webkit-scrollbar {
      display: none;
    }
    
    /* === CARDS === */
    .card {
      flex: 0 0 auto;
      width: 45vw;
      max-width: 200px;
      cursor: pointer;
      scroll-snap-align: start;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      transition: transform 0.3s, box-shadow 0.3s;
      background: #1a1a2e;
    }
    
    .card:active {
      transform: scale(0.96);
    }
    
    .card-img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #1a1a2e;
      overflow: hidden;
    }
    
    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }
    
    .card:hover .card-img {
      transform: scale(1.1);
    }
    
    .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 30px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .card:hover .card-overlay,
    .card:active .card-overlay {
      opacity: 1;
    }
    
    .card-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .card-meta {
      font-size: 0.75rem;
      color: #aaa;
    }
    
    .card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #E50914;
      color: white;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      z-index: 2;
    }
    
    .card-list-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 3;
      transition: 0.3s;
      font-size: 0.8rem;
    }
    
    .card-list-btn.in-list {
      background: #E50914;
      border-color: #E50914;
    }
    
    /* === GRID PARA OTRAS SECCIONES === */
    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      padding: 20px 5%;
      padding-top: 80px;
    }
    
    .section-title {
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      font-weight: 700;
      margin-bottom: 15px;
      color: #e5e5e5;
      grid-column: 1 / -1;
    }
    
    /* === SEARCH === */
    .search-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: none;
      flex-direction: column;
      padding: 20px;
      padding-top: calc(20px + var(--safe-top));
      overflow-y: auto;
    }
    
    .search-screen.active {
      display: flex;
    }
    
    .search-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .search-back {
      background: none;
      border: none;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 10px;
    }
    
    .search-input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0 15px;
    }
    
    .search-input-wrapper input {
      flex: 1;
      padding: 14px 0;
      background: transparent;
      border: none;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    
    .search-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-chip {
      padding: 8px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.3s;
      white-space: nowrap;
    }
    
    .filter-chip.active {
      background: #E50914;
      border-color: #E50914;
    }
    
    .search-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    
    /* === BOTTOM NAV === */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 8px 0;
      padding-bottom: calc(8px + var(--safe-bottom));
      z-index: 100;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #888;
      background: none;
      border: none;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.3s;
      padding: 5px 10px;
    }
    
    .nav-item.active {
      color: white;
    }
    
    .nav-item i {
      font-size: 1.2rem;
    }
    
    /* === PLAYER === */
    .player-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: none;
    }
    
    .player-overlay.active {
      display: block;
    }
    
    .player-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .close-player {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      font-size: 1rem;
      transition: 0.3s;
    }
    
    .close-player:hover {
      background: rgba(0,0,0,0.9);
      transform: scale(1.1);
    }
    
    /* === PROFILE PANEL === */
    .profile-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 85%;
      max-width: 350px;
      height: 100%;
      background: rgba(0,0,0,0.98);
      backdrop-filter: blur(20px);
      z-index: 300;
      transition: right 0.3s ease;
      padding: 30px 20px;
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    
    .profile-panel.open {
      right: 0;
    }
    
    .panel-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
    }
    
    .panel-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 16px 0;
      color: #ccc;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      font-size: 0.95rem;
      transition: 0.3s;
    }
    
    .panel-item:hover {
      color: white;
    }
    
    .panel-item i {
      width: 20px;
      color: #E50914;
    }
    
    /* === RESPONSIVE TV === */
    @media (min-width: 768px) {
      .card {
        width: 28vw;
        max-width: 250px;
      }
      
      .hero-section {
        height: 80vh;
      }
      
      .hero-content {
        left: 8%;
        right: 8%;
      }
      
      .section-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
    }
    
    @media (min-width: 1200px) {
      .card {
        width: 18vw;
        max-width: 300px;
      }
      
      .hero-section {
        height: 85vh;
      }
      
      .hero-content {
        left: 10%;
        right: 10%;
        bottom: 20%;
      }
      
      .hero-title {
        font-size: 4rem;
      }
      
      .bottom-nav {
        display: none;
      }
      
      .content-area {
        padding-bottom: 20px;
      }
      
      .card:hover {
        transform: scale(1.1);
        z-index: 10;
        box-shadow: 0 15px 40px rgba(0,0,0,0.8);
      }
      
      .section-grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
      }
    }
    
    /* Animaciones */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hero-content > * {
      animation: fadeInUp 0.8s ease forwards;
    }
    
    .hero-content > *:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .hero-content > *:nth-child(3) {
      animation-delay: 0.4s;
    }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-container">
      <div class="auth-logo">FINKI</div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">Iniciar sesión</button>
        <button class="auth-tab" onclick="switchAuth('register')">Registrarse</button>
      </div>
      <form id="loginForm">
        <div class="input-group">
          <i class="fas fa-mobile-alt"></i>
          <input type="tel" id="loginPhone" placeholder="Celular (8 dígitos)" maxlength="8" inputmode="numeric">
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPass" placeholder="Contraseña">
        </div>
        <div class="error-msg" id="loginError"></div>
        <button type="submit" class="btn-submit">Iniciar sesión</button>
      </form>
      <form id="registerForm" style="display:none;">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="regName" placeholder="Nombre completo">
        </div>
        <div class="input-group">
          <i class="fas fa-calendar"></i>
          <input type="number" id="regAge" placeholder="Edad" min="1" max="120">
        </div>
        <div class="input-group">
          <i class="fas fa-mobile-alt"></i>
          <input type="tel" id="regPhone" placeholder="Celular (8 dígitos)" maxlength="8">
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="regPass" placeholder="Contraseña">
        </div>
        <div class="error-msg" id="registerError"></div>
        <button type="submit" class="btn-submit">Crear cuenta</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div class="app" id="appContainer">
    <header class="header">
      <div class="header-logo">FINKI</div>
      <div class="header-right">
        <button class="header-btn" onclick="openSearch()"><i class="fas fa-search"></i></button>
        <div class="profile-avatar" id="headerAvatar" onclick="toggleProfile()">U</div>
      </div>
    </header>
    
    <div class="content-area" id="contentArea">
      <!-- Contenido dinámico se carga aquí -->
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-section="home"><i class="fas fa-home"></i><span>Inicio</span></button>
      <button class="nav-item" data-section="movies"><i class="fas fa-film"></i><span>Películas</span></button>
      <button class="nav-item" data-section="series"><i class="fas fa-tv"></i><span>Series</span></button>
      <button class="nav-item" data-section="channels"><i class="fas fa-satellite-dish"></i><span>Canales</span></button>
      <button class="nav-item" data-section="mylist"><i class="fas fa-bookmark"></i><span>Mi lista</span></button>
    </nav>
  </div>

  <!-- Search Screen -->
  <div class="search-screen" id="searchScreen">
    <div class="search-header">
      <button class="search-back" onclick="closeSearch()"><i class="fas fa-arrow-left"></i></button>
      <div class="search-input-wrapper">
        <i class="fas fa-search" style="color:#888; margin-right:10px;"></i>
        <input type="text" id="searchInput" placeholder="Buscar contenido..." autocomplete="off">
        <i class="fas fa-times" style="color:#888; cursor:pointer;" onclick="clearSearch()"></i>
      </div>
    </div>
    <div class="search-filters" id="searchFilters">
      <button class="filter-chip active" data-filter="all">Todos</button>
      <button class="filter-chip" data-filter="pelicula">Películas</button>
      <button class="filter-chip" data-filter="serie">Series</button>
      <button class="filter-chip" data-filter="canal">Canales</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Player Overlay -->
  <div class="player-overlay" id="playerOverlay">
    <button class="close-player" onclick="closePlayer()"><i class="fas fa-times"></i></button>
    <iframe class="player-frame" id="playerFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>

  <!-- Profile Panel -->
  <div class="profile-panel" id="profilePanel">
    <button class="panel-close" onclick="toggleProfile()"><i class="fas fa-times"></i></button>
    <div style="display:flex; align-items:center; gap:15px; margin:30px 0;">
      <div class="profile-avatar" style="width:45px;height:45px;font-size:1.1rem;" id="panelAvatar">U</div>
      <div>
        <div style="font-weight:700; font-size:1.1rem;" id="panelName">Usuario</div>
        <div style="color:#999; font-size:0.85rem;" id="panelPhone">Celular</div>
      </div>
    </div>
    <div class="panel-item" onclick="showSection('mylist'); toggleProfile();"><i class="fas fa-bookmark"></i> Mi lista</div>
    <div class="panel-item" onclick="showSection('history'); toggleProfile();"><i class="fas fa-history"></i> Historial</div>
    <div class="panel-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</div>
  </div>

  <script>
    // Supabase Config
    const SUPABASE_URL = 'https://rojsndimvyjzgstxivqo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_djOXqhg8VILB9fwLLFkNlg_xjWvBqEh';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // App State
    let currentUser = null;
    let allContent = [];
    let myList = [];
    let history = [];
    let heroContent = [];
    let currentHeroIndex = 0;
    let heroInterval = null;
    let currentSection = 'home';

    // ============ AUTH ============
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = document.getElementById('loginPhone').value.trim();
      const pass = document.getElementById('loginPass').value;
      const errEl = document.getElementById('loginError');
      
      if (!/^\d{8}$/.test(phone)) {
        errEl.style.display = 'block';
        errEl.textContent = 'El celular debe tener 8 dígitos';
        return;
      }
      
      errEl.style.display = 'none';
      const { data, error } = await supabaseClient.from('users').select('*').eq('celular', phone).eq('password', pass).single();
      
      if (error || !data) {
        errEl.style.display = 'block';
        errEl.textContent = 'Credenciales incorrectas';
        return;
      }
      
      loginUser(data);
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const age = document.getElementById('regAge').value;
      const phone = document.getElementById('regPhone').value.trim();
      const pass = document.getElementById('regPass').value;
      const errEl = document.getElementById('registerError');
      
      if (!name || !age || !phone || !pass) {
        errEl.style.display = 'block';
        errEl.textContent = 'Todos los campos son obligatorios';
        return;
      }
      
      if (!/^\d{8}$/.test(phone)) {
        errEl.style.display = 'block';
        errEl.textContent = 'Celular debe tener 8 dígitos';
        return;
      }
      
      errEl.style.display = 'none';
      const { data: exist } = await supabaseClient.from('users').select('celular').eq('celular', phone).single();
      if (exist) {
        errEl.style.display = 'block';
        errEl.textContent = 'Este celular ya está registrado';
        return;
      }
      
      const { data, error } = await supabaseClient.from('users').insert([{
        nombre: name,
        edad: parseInt(age),
        celular: phone,
        password: pass
      }]).select();
      
      if (error) {
        errEl.style.display = 'block';
        errEl.textContent = 'Error al registrar';
        return;
      }
      
      loginUser(data[0]);
    });

    function loginUser(user) {
      currentUser = user;
      localStorage.setItem('finki_user', JSON.stringify(user));
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appContainer').classList.add('active');
      updateProfileUI();
      loadUserData();
      fetchContent();
    }

    function logout() {
      localStorage.removeItem('finki_user');
      location.reload();
    }

    function switchAuth(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.auth-tab[onclick*="${tab}"]`).classList.add('active');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    function updateProfileUI() {
      if (!currentUser) return;
      const initial = currentUser.nombre.charAt(0).toUpperCase();
      document.getElementById('headerAvatar').textContent = initial;
      document.getElementById('panelAvatar').textContent = initial;
      document.getElementById('panelName').textContent = currentUser.nombre;
      document.getElementById('panelPhone').textContent = currentUser.celular;
    }

    // ============ LOCAL DATA ============
    function loadUserData() {
      if (!currentUser) return;
      const base = `finki_${currentUser.id}`;
      myList = JSON.parse(localStorage.getItem(`${base}_mylist`) || '[]');
      history = JSON.parse(localStorage.getItem(`${base}_history`) || '[]');
    }

    function saveList() {
      if (!currentUser) return;
      localStorage.setItem(`finki_${currentUser.id}_mylist`, JSON.stringify(myList));
    }

    function saveHistory() {
      if (!currentUser) return;
      localStorage.setItem(`finki_${currentUser.id}_history`, JSON.stringify(history));
    }

    // ============ CONTENT ============
    async function fetchContent() {
      const { data, error } = await supabaseClient.from('contenido').select('*, categorias(nombre)').order('fecha_agregado', { ascending: false });
      
      if (error) {
        console.error('Error fetching content:', error);
        return;
      }
      
      allContent = data || [];
      
      if (allContent.length > 0) {
        // Los 5 últimos contenidos recientes para el carrusel
        heroContent = allContent.slice(0, 5);
      }
      
      // Mostrar sección de inicio por defecto
      showSection('home');
    }

    // ============ HERO CAROUSEL (SOLO EN INICIO) ============
    function renderHomeWithCarousel() {
      const contentArea = document.getElementById('contentArea');
      
      let html = '';
      
      // Solo mostrar carrusel si hay contenido
      if (heroContent.length > 0) {
        html += `
          <div class="hero-section" id="heroSection">
            ${heroContent.map((item, index) => `
              <div class="hero-slide ${index === 0 ? 'active' : ''}" 
                   style="background-image: url('${item.url_portada || ''}');"
                   data-index="${index}">
              </div>
            `).join('')}
            <div class="hero-gradient"></div>
            <div class="hero-content">
              <h1 class="hero-title" id="heroTitle">${heroContent[0].nombre}</h1>
              <p class="hero-meta" id="heroMeta">${heroContent[0].categorias?.nombre || 'Contenido exclusivo'}</p>
              <div class="hero-buttons">
                <button class="btn-hero btn-play" onclick="playHero()"><i class="fas fa-play"></i> Reproducir</button>
                <button class="btn-hero btn-list" onclick="addHeroToList()"><i class="fas fa-plus"></i> Mi lista</button>
              </div>
            </div>
            <div class="hero-progress" id="heroProgress">
              ${heroContent.map((_, index) => `
                <div class="progress-dot ${index === 0 ? 'active' : ''}" 
                     onclick="goToHeroSlide(${index})"
                     data-index="${index}"></div>
              `).join('')}
            </div>
          </div>
        `;
      }
      
      // Añadir filas de contenido destacado debajo del carrusel
      const destacados = allContent.slice(5, 15); // Siguientes 10 después del carrusel
      const peliculas = allContent.filter(i => i.tipo === 'pelicula').slice(0, 10);
      const series = allContent.filter(i => i.tipo === 'serie').slice(0, 10);
      
      if (destacados.length > 0) {
        html += `
          <div class="content-row">
            <h2 class="row-header">🔥 Destacados</h2>
            <div class="row-slider">
              ${destacados.map(item => createCard(item)).join('')}
            </div>
          </div>
        `;
      }
      
      if (peliculas.length > 0) {
        html += `
          <div class="content-row">
            <h2 class="row-header">🎬 Películas</h2>
            <div class="row-slider">
              ${peliculas.map(item => createCard(item)).join('')}
            </div>
          </div>
        `;
      }
      
      if (series.length > 0) {
        html += `
          <div class="content-row">
            <h2 class="row-header">📺 Series</h2>
            <div class="row-slider">
              ${series.map(item => createCard(item)).join('')}
            </div>
          </div>
        `;
      }
      
      contentArea.innerHTML = html;
      
      // Actualizar color de fondo del héroe
      if (heroContent.length > 0) {
        updateHeroBackground(heroContent[0]);
      }
      
      // Iniciar rotación automática
      startHeroRotation();
    }

    function updateHeroSlide(index) {
      if (!heroContent[index]) return;
      
      const item = heroContent[index];
      
      // Actualizar texto
      document.getElementById('heroTitle').textContent = item.nombre;
      document.getElementById('heroMeta').textContent = item.categorias?.nombre || 'Contenido exclusivo';
      
      // Actualizar slides
      document.querySelectorAll('.hero-slide').forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
      });
      
      // Actualizar dots
      document.querySelectorAll('.progress-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });
      
      // Actualizar color de fondo
      updateHeroBackground(item);
      
      currentHeroIndex = index;
    }

    function updateHeroBackground(item) {
      const img = new Image();
      img.crossOrigin = 'Anonymous';
      img.src = item.url_portada || '';
      
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let r = 0, g = 0, b = 0;
        const step = Math.floor(imageData.length / 1000);
        
        for (let i = 0; i < imageData.length; i += step * 4) {
          r += imageData[i];
          g += imageData[i + 1];
          b += imageData[i + 2];
        }
        
        const count = Math.floor(imageData.length / (step * 4));
        r = Math.floor(r / count);
        g = Math.floor(g / count);
        b = Math.floor(b / count);
        
        const heroSection = document.getElementById('heroSection');
        if (heroSection) {
          heroSection.style.background = 
            `radial-gradient(ellipse at center, rgba(${r},${g},${b},0.3) 0%, rgba(0,0,0,0.8) 70%)`;
        }
      };
    }

    function goToHeroSlide(index) {
      updateHeroSlide(index);
      restartHeroRotation();
    }

    function startHeroRotation() {
      stopHeroRotation();
      if (heroContent.length > 1) {
        heroInterval = setInterval(() => {
          const nextIndex = (currentHeroIndex + 1) % heroContent.length;
          updateHeroSlide(nextIndex);
        }, 5000);
      }
    }

    function stopHeroRotation() {
      if (heroInterval) {
        clearInterval(heroInterval);
        heroInterval = null;
      }
    }

    function restartHeroRotation() {
      stopHeroRotation();
      startHeroRotation();
    }

    // ============ CREATE CARD ============
    function createCard(item) {
      const inList = myList.some(i => i.id === item.id);
      const badge = item.tipo === 'canal' ? 'EN VIVO' : (item.tipo === 'serie' ? 'SERIE' : 'PELÍCULA');
      
      return `
        <div class="card" onclick="playContent('${escapeHtml(item.url_contenido)}', '${item.id}')">
          <div class="card-img-container">
            <img src="${item.url_portada || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 56%22><rect fill=%22%231a1a2e%22 width=%22100%22 height=%2256%22/></svg>'}" 
                 class="card-img" 
                 loading="lazy"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 56%22><rect fill=%22%231a1a2e%22 width=%22100%22 height=%2256%22/></svg>'">
            <span class="card-badge">${badge}</span>
            <button class="card-list-btn ${inList ? 'in-list' : ''}" 
                    onclick="event.stopPropagation(); toggleList('${item.id}')">
              <i class="fas ${inList ? 'fa-check' : 'fa-plus'}"></i>
            </button>
          </div>
          <div class="card-overlay">
            <div class="card-title">${item.nombre}</div>
            <div class="card-meta">${item.categorias?.nombre || 'General'}</div>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // ============ SECTIONS ============
    function showSection(section) {
      currentSection = section;
      
      // Detener carrusel si no estamos en home
      if (section !== 'home') {
        stopHeroRotation();
      }
      
      // Actualizar navegación
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`.nav-item[data-section="${section}"]`)?.classList.add('active');
      
      const contentArea = document.getElementById('contentArea');
      
      switch(section) {
        case 'home':
          renderHomeWithCarousel();
          break;
        case 'movies':
          renderCategoryGrid('pelicula', '🎬 Películas');
          break;
        case 'series':
          renderCategoryGrid('serie', '📺 Series');
          break;
        case 'channels':
          renderCategoryGrid('canal', '📡 Canales en Vivo');
          break;
        case 'mylist':
          renderMyListGrid();
          break;
        case 'history':
          renderHistoryGrid();
          break;
      }
      
      // Scroll to top
      contentArea.scrollTop = 0;
    }

    function renderCategoryGrid(tipo, title) {
      const items = allContent.filter(i => i.tipo === tipo);
      const contentArea = document.getElementById('contentArea');
      
      contentArea.innerHTML = `
        <div class="section-grid">
          <h1 class="section-title">${title}</h1>
          ${items.length > 0 ? items.map(item => createCard(item)).join('') : 
            '<p style="color:#888; grid-column:1/-1; text-align:center; padding:40px;">No hay contenido disponible</p>'}
        </div>
      `;
    }

    function renderMyListGrid() {
      const contentArea = document.getElementById('contentArea');
      
      contentArea.innerHTML = `
        <div class="section-grid">
          <h1 class="section-title">📌 Mi Lista</h1>
          ${myList.length > 0 ? myList.map(item => createCard(item)).join('') : 
            '<p style="color:#888; grid-column:1/-1; text-align:center; padding:40px;">Tu lista está vacía</p>'}
        </div>
      `;
    }

    function renderHistoryGrid() {
      const contentArea = document.getElementById('contentArea');
      
      contentArea.innerHTML = `
        <div class="section-grid">
          <h1 class="section-title">🕐 Historial</h1>
          ${history.length > 0 ? history.map(item => createCard(item)).join('') : 
            '<p style="color:#888; grid-column:1/-1; text-align:center; padding:40px;">No hay historial</p>'}
        </div>
      `;
    }

    // ============ PLAYER ============
    function playContent(url, contentId) {
      let finalUrl = url;
      
      if (url.includes('<iframe')) {
        const match = url.match(/src=["']([^"']+)["']/);
        if (match) finalUrl = match[1];
      }
      
      if (finalUrl.includes('youtube.com') && !finalUrl.includes('autoplay=1')) {
        finalUrl += (finalUrl.includes('?') ? '&' : '?') + 'autoplay=1';
      }
      
      const playerFrame = document.getElementById('playerFrame');
      playerFrame.src = finalUrl;
      document.getElementById('playerOverlay').classList.add('active');
      
      const item = allContent.find(i => i.id === contentId);
      if (item) {
        addToHistory(item);
      }
      
      try {
        const playerOverlay = document.getElementById('playerOverlay');
        if (playerOverlay.requestFullscreen) {
          playerOverlay.requestFullscreen();
        } else if (playerOverlay.webkitRequestFullscreen) {
          playerOverlay.webkitRequestFullscreen();
        }
      } catch (e) {
        console.log('Fullscreen not available');
      }
    }

    function closePlayer() {
      document.getElementById('playerFrame').src = '';
      document.getElementById('playerOverlay').classList.remove('active');
      
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
    }

    function playHero() {
      if (heroContent.length > 0) {
        playContent(heroContent[currentHeroIndex].url_contenido, heroContent[currentHeroIndex].id);
      }
    }

    function addHeroToList() {
      if (heroContent.length > 0) {
        toggleList(heroContent[currentHeroIndex].id);
      }
    }

    // ============ LIST MANAGEMENT ============
    function toggleList(contentId) {
      const item = allContent.find(i => i.id === contentId);
      if (!item) return;
      
      const index = myList.findIndex(i => i.id === contentId);
      if (index === -1) {
        myList.push({
          id: item.id,
          nombre: item.nombre,
          url_contenido: item.url_contenido,
          url_portada: item.url_portada,
          tipo: item.tipo
        });
      } else {
        myList.splice(index, 1);
      }
      
      saveList();
      
      // Refrescar vista actual
      showSection(currentSection);
    }

    function addToHistory(item) {
      history = history.filter(i => i.id !== item.id);
      history.unshift({
        id: item.id,
        nombre: item.nombre,
        url_contenido: item.url_contenido,
        tipo: item.tipo
      });
      
      if (history.length > 30) history.pop();
      saveHistory();
    }

    // ============ SEARCH ============
    function openSearch() {
      document.getElementById('searchScreen').classList.add('active');
      setTimeout(() => document.getElementById('searchInput').focus(), 300);
    }

    function closeSearch() {
      document.getElementById('searchScreen').classList.remove('active');
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResults').innerHTML = '';
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      performSearch('', 'all');
    }

    document.getElementById('searchInput').addEventListener('input', function() {
      const filter = document.querySelector('.filter-chip.active')?.dataset.filter || 'all';
      performSearch(this.value, filter);
    });

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        performSearch(document.getElementById('searchInput').value, this.dataset.filter);
      });
    });

    function performSearch(query, filter) {
      let results = allContent;
      
      if (query) {
        const q = query.toLowerCase();
        results = results.filter(i => 
          i.nombre.toLowerCase().includes(q) ||
          (i.categorias?.nombre && i.categorias.nombre.toLowerCase().includes(q))
        );
      }
      
      if (filter !== 'all') {
        results = results.filter(i => i.tipo === filter);
      }
      
      document.getElementById('searchResults').innerHTML = 
        results.map(item => createCard(item)).join('');
    }

    // ============ PROFILE ============
    function toggleProfile() {
      document.getElementById('profilePanel').classList.toggle('open');
    }

    // ============ NAVIGATION ============
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', function() {
        showSection(this.dataset.section);
      });
    });

    // ============ KEYBOARD / TV REMOTE ============
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closePlayer();
        closeSearch();
        document.getElementById('profilePanel').classList.remove('open');
      }
      
      if (window.innerWidth > 1200) {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
          const sliders = document.querySelectorAll('.row-slider');
          sliders.forEach(slider => {
            if (slider.matches(':focus-within')) {
              e.preventDefault();
              slider.scrollLeft += e.key === 'ArrowLeft' ? -300 : 300;
            }
          });
        }
      }
    });

    // ============ INIT ============
    (function init() {
      const saved = localStorage.getItem('finki_user');
      if (saved) {
        try {
          currentUser = JSON.parse(saved);
          document.getElementById('authScreen').style.display = 'none';
          document.getElementById('appContainer').classList.add('active');
          updateProfileUI();
          loadUserData();
          fetchContent();
        } catch (e) {
          localStorage.removeItem('finki_user');
        }
      }
    })();
  </script>
</body>
</html>
