<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A2F1F">
    <title>FINKI GC · CANAL 7.1 BOLIVIA TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --verde-profundo: #0A2F1F;
            --verde-oscuro: #1A4D2A;
            --verde-brillante: #2E7D32;
            --verde-neon: #4CAF50;
            --negro-carbono: #030603;
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        body {
            background-color: var(--negro-carbono);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Inter', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* PANTALLA DE INICIO - 3 SEGUNDOS */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #030603 0%, #0A2F1F 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 1;
            transition: opacity 0.6s ease;
        }
        
        .splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        .splash-content {
            text-align: center;
            animation: fadeInScale 0.5s ease;
        }
        
        .splash-mascota {
            width: 220px;
            height: 220px;
            margin: 0 auto 25px;
            background-image: url('m.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 30px rgba(76, 175, 80, 0.7));
            animation: float 2s ease-in-out infinite;
        }
        
        .splash-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFFFFF, #4CAF50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        
        .splash-sub {
            font-size: 1.2rem;
            color: #4CAF50;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .splash-loader {
            width: 50px;
            height: 50px;
            margin: 30px auto 0;
            position: relative;
        }
        
        .splash-loader::before,
        .splash-loader::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            animation: pulse-ring 1.5s ease-out infinite;
        }
        
        .splash-loader::before {
            width: 100%;
            height: 100%;
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
        }
        
        .splash-loader::after {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            background: rgba(76, 175, 80, 0.4);
            border: 2px solid #4CAF50;
            animation-delay: 0.5s;
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* APP PRINCIPAL */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000000;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .app-container.visible {
            opacity: 1;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: linear-gradient(180deg, rgba(3,6,3,0.95) 0%, rgba(3,6,3,0) 100%);
            padding: 20px 24px 40px 24px;
            pointer-events: none;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .mascota {
            width: 48px;
            height: 48px;
            background-image: url('m.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 8px #4CAF50);
        }
        
        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF, #4CAF50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .badge-live {
            background: #E53935;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(229,57,53,0.6);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(0.98);}
            50% { opacity: 1; transform: scale(1);}
        }
        
        /* PLAYER */
        .player-wrapper {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #000000;
            position: relative;
            overflow: hidden;
        }
        
        .video-container {
            width: 100%;
            height: 100%;
            background: black;
            position: relative;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: black;
        }
        
        .channel-overlay {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 40px;
            border-left: 5px solid var(--verde-neon);
            font-weight: bold;
            z-index: 30;
            pointer-events: none;
            font-size: 1rem;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .channel-overlay.show {
            opacity: 1;
        }
        
        .channel-number {
            color: var(--verde-neon);
            margin-right: 8px;
        }
        
        /* CONTROLES INVISIBLES PERO FUNCIONALES */
        .hidden-controls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            pointer-events: none;
        }
        
        .touch-zone {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 25%;
            pointer-events: auto;
            background: transparent;
        }
        
        .touch-left {
            left: 0;
        }
        
        .touch-right {
            right: 0;
        }
        
        .guide-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: transparent;
            border: none;
            pointer-events: auto;
            cursor: pointer;
            opacity: 0;
        }
        
        /* GUÍA DE CANALES */
        .guide-panel {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: rgba(3,6,3,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px 0;
            min-width: 240px;
            border: 1px solid rgba(76,175,80,0.3);
            z-index: 150;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            pointer-events: auto;
        }
        
        .guide-panel.open {
            transform: translateX(0);
        }
        
        .guide-item {
            padding: 12px 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            border-bottom: 1px solid rgba(76,175,80,0.2);
            cursor: pointer;
        }
        
        .guide-item:active {
            background: rgba(76,175,80,0.2);
        }
        
        .guide-num {
            font-weight: bold;
            color: #4CAF50;
            width: 35px;
        }
        
        .guide-name {
            font-weight: 500;
        }
        
        /* TOAST */
        .toast-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            color: #4CAF50;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        
        .toast-msg.show {
            opacity: 1;
        }
        
        .key-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #aaa;
            z-index: 200;
            backdrop-filter: blur(4px);
        }
        
        @media (max-width: 768px) {
            .key-hint {
                display: none;
            }
            .brand {
                font-size: 1rem;
            }
            .mascota {
                width: 32px;
                height: 32px;
            }
        }
        
        @media (min-width: 1024px) {
            .brand {
                font-size: 2rem;
            }
            .mascota {
                width: 64px;
                height: 64px;
            }
        }
        
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE INICIO - 3 SEGUNDOS -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-mascota"></div>
            <div class="splash-title">FINKI GC - J</div>
            <div class="splash-sub">CANAL 7.1 · BOLIVIA TV</div>
            <div class="splash-loader"></div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div class="app-container" id="appContainer">
        <div class="header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="mascota"></div>
                    <span class="brand">FINKI GC · BOLIVIA TV</span>
                </div>
                <div class="badge-live">EN VIVO</div>
            </div>
        </div>

        <div class="player-wrapper">
            <div class="video-container" id="videoContainer"></div>
            <div class="channel-overlay" id="channelOverlay">
                <span class="channel-number">7.1</span>
                <span id="channelName">BOLIVIA TV · EN VIVO</span>
            </div>
        </div>

        <!-- CONTROLES INVISIBLES PERO FUNCIONALES -->
        <div class="hidden-controls">
            <div class="touch-zone touch-left" id="touchLeft"></div>
            <div class="touch-zone touch-right" id="touchRight"></div>
            <button class="guide-trigger" id="guideTrigger"></button>
        </div>
        
        <div class="guide-panel" id="guidePanel"></div>
        <div class="key-hint">🎮 Números 1-9 · ← → · ↑↓ guía</div>
        <div class="toast-msg" id="toastMsg"></div>
    </div>

    <script>
        // ==================== ÚNICO CANAL: CANAL 7.1 BOLIVIA TV ====================
        const CANAL = {
            id: "7.1",
            name: "BOLIVIA TV",
            embed: `<iframe src="https://geo.dailymotion.com/player/x12yfi.html?video=x9nzqpo&autoplay=1&mute=0" style="width:100%; height:100%; border:none;" allow="autoplay; fullscreen; picture-in-picture; web-share" allowfullscreen></iframe>`
        };

        let overlayTimeout = null;
        let touchStartX = 0;

        const videoContainer = document.getElementById('videoContainer');
        const channelOverlay = document.getElementById('channelOverlay');
        const guidePanel = document.getElementById('guidePanel');
        const toastMsg = document.getElementById('toastMsg');
        const splashScreen = document.getElementById('splashScreen');
        const appContainer = document.getElementById('appContainer');

        // ========== PANTALLA COMPLETA AUTOMÁTICA ==========
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }

        // ========== MOSTRAR NOTIFICACIÓN ==========
        function showToast(msg) {
            toastMsg.innerText = msg;
            toastMsg.classList.add('show');
            setTimeout(() => toastMsg.classList.remove('show'), 1200);
        }

        // ========== MOSTRAR OVERLAY ==========
        function showChannelOverlay() {
            channelOverlay.classList.add('show');
            if (overlayTimeout) clearTimeout(overlayTimeout);
            overlayTimeout = setTimeout(() => {
                channelOverlay.classList.remove('show');
            }, 2000);
        }

        // ========== CARGAR CANAL CON SONIDO AUTOMÁTICO ==========
        function loadChannel() {
            videoContainer.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.style.width = '100%';
            wrapper.style.height = '100%';
            wrapper.style.position = 'relative';
            wrapper.innerHTML = CANAL.embed;
            videoContainer.appendChild(wrapper);
            
            const iframe = wrapper.querySelector('iframe');
            if (iframe) {
                iframe.allow = "autoplay; fullscreen; encrypted-media; web-share";
                
                // Forzar recarga con autoplay
                let src = iframe.src;
                if (!src.includes('autoplay=1')) {
                    src = src.replace('autoplay=0', 'autoplay=1');
                    if (!src.includes('autoplay')) {
                        src += (src.includes('?') ? '&' : '?') + 'autoplay=1';
                    }
                }
                if (!src.includes('mute=0')) {
                    src = src.replace('mute=1', 'mute=0');
                    if (!src.includes('mute')) {
                        src += '&mute=0';
                    }
                }
                iframe.src = src;
            }
            
            showChannelOverlay();
        }

        // ========== REFRESCAR CANAL (MANTIENE EL MISMO) ==========
        function refreshChannel() {
            loadChannel();
            showToast("📺 CANAL 7.1 BOLIVIA TV");
        }

        // ========== GESTOS DESLIZAR ==========
        function initGestures() {
            // Deslizar en toda la pantalla
            document.body.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            });
            document.body.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].screenX;
                const diff = touchEndX - touchStartX;
                if (Math.abs(diff) > 50) {
                    refreshChannel();
                }
                touchStartX = 0;
            });
            
            // Zonas táctiles laterales
            document.getElementById('touchLeft').addEventListener('click', () => refreshChannel());
            document.getElementById('touchRight').addEventListener('click', () => refreshChannel());
        }

        // ========== CONTROL TECLADO (CONTROL REMOTO) ==========
        function initKeyboard() {
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                // Cualquier número del 1 al 9
                if (key >= '1' && key <= '9') {
                    refreshChannel();
                    e.preventDefault();
                }
                // Flechas izquierda/derecha
                if (key === 'ArrowRight' || key === 'ArrowLeft') {
                    refreshChannel();
                    e.preventDefault();
                }
                // Flechas arriba/abajo para guía
                if (key === 'ArrowUp' || key === 'ArrowDown') {
                    toggleGuide();
                    e.preventDefault();
                }
                // Tecla F para pantalla completa
                if (key === 'f' || key === 'F') {
                    enterFullscreen();
                    e.preventDefault();
                }
                // Escape para cerrar guía
                if (key === 'Escape') {
                    guidePanel.classList.remove('open');
                    e.preventDefault();
                }
            });
        }

        // ========== GUÍA DE CANALES ==========
        function renderGuide() {
            guidePanel.innerHTML = '';
            const item = document.createElement('div');
            item.className = 'guide-item';
            item.innerHTML = `<span class="guide-num">7.1</span><span class="guide-name">BOLIVIA TV · EN VIVO</span>`;
            item.onclick = () => {
                refreshChannel();
                guidePanel.classList.remove('open');
            };
            guidePanel.appendChild(item);
        }

        function toggleGuide() {
            guidePanel.classList.toggle('open');
        }

        function initGuideButton() {
            document.getElementById('guideTrigger').onclick = () => toggleGuide();
            document.addEventListener('click', (e) => {
                if (!guidePanel.contains(e.target) && e.target !== document.getElementById('guideTrigger')) {
                    guidePanel.classList.remove('open');
                }
            });
        }

        // ========== FORZAR SONIDO AUTOMÁTICO ==========
        function forceAudio() {
            // Desbloquear AudioContext
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Forzar reproducción en iframes
            setTimeout(() => {
                const iframes = document.querySelectorAll('iframe');
                iframes.forEach(iframe => {
                    try {
                        iframe.contentWindow.postMessage('play', '*');
                    } catch(e) {}
                });
            }, 100);
            setTimeout(() => {
                const iframes = document.querySelectorAll('iframe');
                iframes.forEach(iframe => {
                    try {
                        iframe.contentWindow.postMessage('play', '*');
                    } catch(e) {}
                });
            }, 500);
        }

        // ========== MANTENER PANTALLA COMPLETA ==========
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && appContainer.classList.contains('visible')) {
                setTimeout(() => enterFullscreen(), 200);
            }
        });

        // ========== INICIO CON SPLASH DE 3 SEGUNDOS ==========
        function startApp() {
            setTimeout(() => {
                splashScreen.classList.add('fade-out');
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                    appContainer.classList.add('visible');
                    
                    enterFullscreen();
                    loadChannel();
                    forceAudio();
                    
                    setTimeout(() => {
                        channelOverlay.classList.add('show');
                        setTimeout(() => {
                            channelOverlay.classList.remove('show');
                        }, 2500);
                    }, 500);
                }, 600);
            }, 3000);
        }

        // ========== INICIALIZAR ==========
        function init() {
            renderGuide();
            initGestures();
            initKeyboard();
            initGuideButton();
            startApp();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
